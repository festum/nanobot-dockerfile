name: Build Main Docker Image

description: >
  Automatically build from the latest main branch and tag as 'main'. Also allows manual triggering.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Checkout Latest Main Branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Get latest SHA from upstream
        id: upstream
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/HKUDS/nanobot.git refs/heads/main | awk '{ print $1 }')
          echo "LATEST_SHA=$LATEST_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            festum/nanobot:main
            festum/nanobot:${{ steps.upstream.outputs.LATEST_SHA }}
          build-args: |
            NANOBOT_VERSION=${{ steps.upstream.outputs.LATEST_SHA }}
