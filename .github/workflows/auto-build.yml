name: Auto Build and Push to Docker Hub

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get latest tag from upstream
        id: upstream
        run: |
          LATEST_TAG=$(git ls-remote --tags https://github.com/HKUDS/nanobot.git | \
            awk -F/ '{print $3}' | grep -v '{}' | sort -V | tail -n1)
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Restore last built SHA (if exists)
        id: last
        run: |
          if [ -f .upstream_sha ]; then
            echo "LAST_SHA=$(cat .upstream_sha)" >> $GITHUB_OUTPUT
          else
            echo "LAST_SHA=none" >> $GITHUB_OUTPUT
          fi

      - name: Check if upstream changed
        id: diff
        run: |
          if [ "${{ steps.upstream.outputs.LATEST_SHA }}" != "${{ steps.last.outputs.LAST_SHA }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.diff.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.diff.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.diff.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            festum/nanobot:latest
            festum/nanobot:${{ steps.upstream.outputs.LATEST_TAG }}
            festum/nanobot:${{ steps.upstream.outputs.LATEST_SHA }}

      - name: Update .upstream_sha
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.LATEST_SHA }}" > .upstream_sha

      - name: Commit updated SHA
        if: steps.diff.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v10
        with:
          add: ".upstream_sha"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "ci: update upstream SHA to ${{ steps.upstream.outputs.LATEST_SHA }}"
          default_author: github_actions
          push: origin HEAD:${{ github.ref_name }}
