name: Build Latest Main

description: >
  Manually trigger a build that always uses the most recently updated main branch, regardless of the current checkout state. Use this to force a build from current production code.

on:
  workflow_dispatch:

jobs:
  manual-main-build:
    name: Build from Latest Main
    runs-on: ubuntu-latest
    steps:
      - name: Force Checkout Latest Main Branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Show Latest Main Commit (for audit)
        run: |
          git log -1 --pretty=format:'Built from main@%H (%cd)'

      - name: Get latest tag from upstream
        id: upstream
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/HKUDS/nanobot.git refs/heads/main | awk '{ print $1 }')
          echo "LATEST_SHA=$LATEST_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            festum/nanobot:latest
            festum/nanobot:${{ steps.upstream.outputs.LATEST_SHA }}
          build-args: |
            NANOBOT_VERSION=${{ steps.upstream.outputs.LATEST_SHA }}
